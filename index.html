<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ميزانيتي">
<meta name="theme-color" content="#0E1A2E">
<link rel="apple-touch-icon" href="apple-icon.png">
<link rel="manifest" href="manifest.json">
<title>ميزانية الأسرة</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1B2A4A;--navy-deep:#0E1A2E;
  --teal:#0D6E6E;--teal-light:#EBF4F4;
  --green:#1A6B3C;--green-med:#2D9E5F;--green-bg:#D4EDDA;
  --gold:#9A7000;--gold-bg:#FFF8E7;
  --red:#C0392B;--red-bg:#FDECEA;
  --bg:#F0F4F8;--card:#FFFFFF;--border:#DDE5EF;
  --muted:#64748B;--text:#1B2A4A;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#0D1117;--card:#161B22;--border:#21262D;--text:#E6EDF3;
  --muted:#8B949E;--teal-light:#0D2020;--green-bg:#0D2E1A;
  --gold-bg:#2A1F00;--red-bg:#2A0A0A;
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans Arabic',sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;direction:rtl}

/* Login */
#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;padding:32px 24px;background:var(--navy-deep)}
.login-logo{font-size:72px;margin-bottom:16px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.login-title{font-size:26px;font-weight:900;color:#fff;margin-bottom:6px}
.login-sub{font-size:13px;color:#64748B;margin-bottom:36px}
.login-card{background:var(--card);border-radius:24px;padding:28px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.login-label{font-size:12px;color:var(--muted);margin-bottom:6px;display:block;font-weight:600}
.login-input{width:100%;padding:14px;border-radius:12px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-size:15px;font-family:inherit;direction:ltr;text-align:left;outline:none;margin-bottom:14px;transition:border-color .2s}
.login-input:focus{border-color:var(--teal)}
.login-btn{width:100%;padding:15px;border-radius:12px;border:none;background:var(--teal);color:#fff;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;transition:opacity .2s;margin-top:4px}
.login-btn:active{opacity:.8}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.login-error{background:var(--red-bg);color:var(--red);border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:14px;display:none;text-align:center}
.login-error.show{display:block}

/* App */
#app{display:none;flex-direction:column;height:100dvh}
#app.visible{display:flex}
.header{background:var(--navy-deep);padding:calc(var(--safe-top) + 12px) 16px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header-title{color:#fff;font-size:16px;font-weight:800}
.header-actions{display:flex;gap:6px;align-items:center}
.header-btn{background:rgba(255,255,255,.08);border:none;color:#94A3B8;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.user-badge{background:rgba(255,255,255,.1);border-radius:20px;padding:4px 10px;color:#94A3B8;font-size:11px}
.sync-bar{background:var(--teal);color:#fff;font-size:11px;text-align:center;padding:4px;display:none;flex-shrink:0}
.sync-bar.show{display:block}
.sync-bar.error{background:var(--red)}
.month-bar{background:var(--teal-light);border-bottom:1px solid var(--border);display:flex;gap:4px;overflow-x:auto;padding:8px 12px;scrollbar-width:none;flex-shrink:0}
.month-bar::-webkit-scrollbar{display:none}
.month-btn{padding:7px 13px;border:none;background:transparent;color:var(--muted);border-radius:9px;cursor:pointer;font-size:12px;font-weight:400;white-space:nowrap;font-family:inherit;transition:all .2s;display:flex;align-items:center;gap:5px}
.month-btn.active{background:var(--teal);color:#fff;font-weight:700}
.month-del{font-size:11px;opacity:.6}
.salary-bar{display:flex;align-items:center;gap:8px;padding:8px 16px 0;flex-shrink:0}
.salary-bar label{font-size:12px;color:var(--muted);white-space:nowrap}
.salary-bar input{width:110px;padding:6px 10px;border-radius:8px;border:1.5px solid var(--border);background:var(--card);color:var(--teal);font-size:13px;font-weight:700;font-family:inherit;direction:rtl;outline:none}
.salary-bar input:focus{border-color:var(--teal)}
.salary-bar span{font-size:11px;color:var(--muted)}
.scroll-area{flex:1;overflow-y:auto;padding:12px 16px;padding-bottom:calc(80px + var(--safe-bot));-webkit-overflow-scrolling:touch}
.card{background:var(--card);border-radius:16px;border:1px solid var(--border);overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:12px}
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{border-radius:14px;padding:14px;border:1.5px solid transparent}
.stat-card .lbl{font-size:11px;color:var(--muted);margin-bottom:4px}
.stat-card .val{font-size:18px;font-weight:900}
.stat-card.green{background:var(--green-bg);border-color:rgba(45,158,95,.3)}
.stat-card.green .val{color:var(--green-med)}
.stat-card.gold{background:var(--gold-bg);border-color:rgba(154,112,0,.3)}
.stat-card.gold .val{color:var(--gold)}
.stat-card.red2{background:var(--red-bg);border-color:rgba(192,57,43,.3)}
.stat-card.red2 .val{color:var(--red)}
.prog-card{padding:14px}
.prog-meta{display:flex;justify-content:space-between;margin-bottom:6px}
.prog-meta span{font-size:11px}
.prog-bg{height:8px;border-radius:4px;background:var(--border);overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.prog-sub{margin-top:5px}
.prog-sub span{font-size:10px;color:var(--muted)}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border)}
.sec-title{font-size:13px;font-weight:700}
.exp-row{display:flex;align-items:center;gap:8px;padding:11px 16px;border-bottom:1px solid var(--border)}
.exp-row:last-child{border-bottom:none}
.exp-row.wife{background:rgba(212,237,218,.35)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot.w{background:var(--green-med)}.dot.r{background:var(--border)}
.exp-info{flex:1;min-width:0}
.exp-name{font-size:13px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exp-name.wife{font-weight:700;color:var(--green)}
.exp-cat{font-size:10px;color:var(--muted);margin-top:2px}
.exp-amt{font-size:13px;font-weight:700;color:var(--teal);white-space:nowrap;flex-shrink:0}
.exp-amt.wife{color:var(--green-med)}
.row-btn{background:none;border:none;cursor:pointer;padding:3px;font-size:14px;color:var(--muted);line-height:1;flex-shrink:0}
.row-btn.heart.on{color:var(--green-med)}
.row-btn.del{color:rgba(192,57,43,.6)}
.add-trigger{width:calc(100% - 32px);margin:10px 16px;padding:11px;border-radius:10px;border:none;background:var(--teal);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px}
.cat-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.cat-pill{padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.cat-pill.active{border-color:var(--teal);background:var(--teal);color:#fff}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border-bottom:1px solid var(--border)}
.sum-row:last-child{border-bottom:none}
.sum-row.hi{background:rgba(212,237,218,.4)}
.sum-lbl{font-size:13px;color:var(--muted)}
.sum-lbl.green{color:var(--green);font-weight:700}
.sum-val{font-size:16px;font-weight:900}
.sum-val.big{font-size:20px}
.sum-val.teal{color:var(--teal)}.sum-val.gold{color:var(--gold)}
.sum-val.green{color:var(--green-med)}.sum-val.red{color:var(--red)}
.chart-sec{padding:14px 16px}
.chart-title{font-size:13px;font-weight:700;margin-bottom:12px}
.chart-item{margin-bottom:9px}
.chart-meta{display:flex;justify-content:space-between;margin-bottom:3px}
.chart-name{font-size:12px}.chart-name.wife{color:var(--green);font-weight:700}
.chart-pct{font-size:11px;color:var(--muted)}
.chart-bg{height:5px;border-radius:3px;background:var(--border);overflow:hidden}
.chart-bar{height:100%;border-radius:3px;transition:width .6s}
.chart-bar.wife{background:var(--green-med)}.chart-bar.reg{background:rgba(13,110,110,.6)}
.cat-sum-row{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border)}
.cat-sum-row:last-child{border-bottom:none}
.cat-sum-label{font-size:13px;display:flex;align-items:center;gap:6px}
.cat-sum-val{font-size:13px;font-weight:700;color:var(--teal)}
.tab-bar{position:fixed;bottom:0;left:0;right:0;padding:10px 20px calc(10px + var(--safe-bot));background:rgba(255,255,255,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex}
@media(prefers-color-scheme:dark){.tab-bar{background:rgba(22,27,34,.9)}}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:4px;font-family:inherit}
.tab-btn .ti{font-size:20px}.tab-btn .tl{font-size:10px;font-weight:500}
.tab-btn.active .ti,.tab-btn.active .tl{color:var(--teal)}
.tab-btn:not(.active) .ti,.tab-btn:not(.active) .tl{color:var(--muted)}
.notif-banner{position:fixed;top:calc(var(--safe-top) + 60px);left:16px;right:16px;background:var(--navy);color:#fff;border-radius:14px;padding:14px 16px;z-index:200;display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,.3);transform:translateY(-200px);transition:transform .4s cubic-bezier(.4,0,.2,1)}
.notif-banner.show{transform:translateY(0)}
.notif-icon{font-size:24px;flex-shrink:0}
.notif-text{flex:1}
.notif-title{font-size:13px;font-weight:700;margin-bottom:2px}
.notif-body{font-size:11px;color:#94A3B8}
.notif-close{background:none;border:none;color:#94A3B8;font-size:18px;cursor:pointer;padding:4px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:flex-end;z-index:100;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:all}
.sheet{background:var(--card);border-radius:20px 20px 0 0;padding:20px 20px calc(20px + var(--safe-bot));width:100%;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:90dvh;overflow-y:auto}
.overlay.open .sheet{transform:translateY(0)}
.sh-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.sh-title{font-size:16px;font-weight:800;text-align:center;margin-bottom:16px}
.sh-input{width:100%;padding:12px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;font-family:inherit;direction:rtl;margin-bottom:10px;outline:none}
.sh-input:focus{border-color:var(--teal)}
.wife-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;cursor:pointer}
.wife-row span{font-size:14px}
.sw{width:38px;height:22px;border-radius:11px;background:var(--border);position:relative;transition:background .2s;flex-shrink:0}
.sw.on{background:var(--green-med)}
.sw-knob{position:absolute;top:3px;right:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:right .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.sw.on .sw-knob{right:19px}
.form-btns{display:flex;gap:8px;margin-top:4px}
.btn-p{flex:1;padding:11px;border-radius:10px;border:none;background:var(--teal);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-s{padding:11px 16px;border-radius:10px;border:none;background:var(--border);color:var(--muted);font-size:14px;cursor:pointer;font-family:inherit}
.btn-danger{flex:1;padding:11px;border-radius:10px;border:none;background:var(--red-bg);color:var(--red);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.notif-btn{width:100%;padding:11px;border-radius:10px;border:1.5px solid var(--teal);background:transparent;color:var(--teal);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:6px}
.notif-btn.on{background:var(--teal);color:#fff}
.sh-section{font-size:12px;color:var(--muted);margin-bottom:8px;margin-top:4px}
</style>
</head>
<body>

<!-- Login -->
<div id="loginScreen">
  <div class="login-logo">💰</div>
  <div class="login-title">ميزانية الأسرة</div>
  <div class="login-sub">سجّل دخولك للمتابعة</div>
  <div class="login-card">
    <div class="login-error" id="loginError">❌ البريد أو كلمة السر غلط</div>
    <label class="login-label">البريد الإلكتروني</label>
    <input class="login-input" type="email" id="loginEmail" placeholder="example@email.com" autocomplete="email">
    <label class="login-label">كلمة السر</label>
    <input class="login-input" type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
    <button class="login-btn" id="loginBtn" onclick="doLogin()">دخول</button>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="header">
    <div class="header-title">💰 ميزانية الأسرة</div>
    <div class="header-actions">
      <div class="user-badge" id="userBadge">👤</div>
      <button class="header-btn" id="notifBtn">🔔</button>
      <button class="header-btn" id="addMonthBtn">＋</button>
      <button class="header-btn" onclick="doLogout()">🚪</button>
    </div>
  </div>
  <div class="sync-bar" id="syncBar"></div>
  <div class="month-bar" id="monthBar"></div>
  <div class="salary-bar">
    <label>الراتب:</label>
    <input type="number" id="salaryInput" value="36216">
    <span>ريال</span>
  </div>
  <div class="scroll-area" id="scrollArea"><div style="text-align:center;padding:40px;color:var(--muted)">⏳ جاري التحميل...</div></div>
  <div class="tab-bar">
    <button class="tab-btn active" id="tabExp" onclick="setTab('exp')"><span class="ti">📋</span><span class="tl">المصاريف</span></button>
    <button class="tab-btn" id="tabSum" onclick="setTab('sum')"><span class="ti">📊</span><span class="tl">الملخص</span></button>
  </div>
</div>

<div class="notif-banner" id="notifBanner">
  <div class="notif-icon">💰</div>
  <div class="notif-text">
    <div class="notif-title" id="notifTitle"></div>
    <div class="notif-body" id="notifBody"></div>
  </div>
  <button class="notif-close" onclick="hideNotifBanner()">✕</button>
</div>

<!-- Sheets -->
<div class="overlay" id="addSheet"><div class="sheet">
  <div class="sh-handle"></div>
  <div class="sh-title">إضافة بند جديد</div>
  <input class="sh-input" type="text" id="newName" placeholder="اسم البند">
  <input class="sh-input" type="number" id="newAmt" placeholder="المبلغ بالريال" inputmode="decimal">
  <div class="sh-section">التصنيف (اختياري)</div>
  <div class="cat-pills" id="newCatPills"></div>
  <div class="wife-row" onclick="toggleSw('newSw','newWife')">
    <div class="sw" id="newSw"><div class="sw-knob"></div></div>
    <span>💚 يُحوَّل لحساب لمى</span>
  </div>
  <div class="form-btns">
    <button class="btn-p" onclick="confirmAdd()">إضافة</button>
    <button class="btn-s" onclick="closeSheet('addSheet')">إلغاء</button>
  </div>
</div></div>

<div class="overlay" id="editSheet"><div class="sheet">
  <div class="sh-handle"></div>
  <div class="sh-title">تعديل البند</div>
  <input class="sh-input" type="text" id="editName" placeholder="اسم البند">
  <input class="sh-input" type="number" id="editAmt" placeholder="المبلغ بالريال" inputmode="decimal">
  <div class="sh-section">التصنيف (اختياري)</div>
  <div class="cat-pills" id="editCatPills"></div>
  <div class="wife-row" onclick="toggleSw('editSw','editWife')">
    <div class="sw" id="editSw"><div class="sw-knob"></div></div>
    <span>💚 يُحوَّل لحساب لمى</span>
  </div>
  <div class="form-btns">
    <button class="btn-p" onclick="confirmEdit()">حفظ</button>
    <button class="btn-s" onclick="closeSheet('editSheet')">إلغاء</button>
  </div>
</div></div>

<div class="overlay" id="monthSheet"><div class="sheet">
  <div class="sh-handle"></div>
  <div class="sh-title">إضافة شهر جديد</div>
  <select id="newMonthIdx" class="sh-input">
    <option value="0">يناير</option><option value="1">فبراير</option>
    <option value="2">مارس</option><option value="3">إبريل</option>
    <option value="4">مايو</option><option value="5">يونيو</option>
    <option value="6">يوليو</option><option value="7">أغسطس</option>
    <option value="8">سبتمبر</option><option value="9">أكتوبر</option>
    <option value="10">نوفمبر</option><option value="11">ديسمبر</option>
  </select>
  <input class="sh-input" type="number" id="newMonthYear" value="2025" placeholder="السنة">
  <div class="form-btns">
    <button class="btn-p" onclick="confirmAddMonth()">إضافة</button>
    <button class="btn-s" onclick="closeSheet('monthSheet')">إلغاء</button>
  </div>
</div></div>

<div class="overlay" id="delMonthSheet"><div class="sheet">
  <div class="sh-handle"></div>
  <div class="sh-title">🗑️ حذف الشهر</div>
  <p style="text-align:center;color:var(--muted);font-size:14px;margin-bottom:20px" id="delMonthMsg"></p>
  <div class="form-btns">
    <button class="btn-danger" onclick="confirmDelMonth()">حذف</button>
    <button class="btn-s" onclick="closeSheet('delMonthSheet')">إلغاء</button>
  </div>
</div></div>

<div class="overlay" id="notifSheet"><div class="sheet">
  <div class="sh-handle"></div>
  <div class="sh-title">🔔 الإشعارات</div>
  <button class="notif-btn" id="notifToggleBtn" onclick="toggleNotifications()">🔔 تفعيل الإشعارات</button>
  <p style="font-size:12px;color:var(--muted);text-align:center;margin-bottom:16px">إشعار داخلي عند أي تعديل من الطرف الثاني</p>
  <button class="btn-s" style="width:100%" onclick="closeSheet('notifSheet')">إغلاق</button>
</div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyC5Ac6_2wLDLQzr2Ri7affoPWLKSQk2_0s",
  authDomain: "monthlybudget-9a32b.firebaseapp.com",
  projectId: "monthlybudget-9a32b",
  storageBucket: "monthlybudget-9a32b.firebasestorage.app",
  messagingSenderId: "801535248559",
  appId: "1:801535248559:web:cee8d6df2d5695d7fc2c5a"
};

const fbApp = initializeApp(firebaseConfig);
const db    = getFirestore(fbApp);
const auth  = getAuth(fbApp);

const MONTHS = ["يناير","فبراير","مارس","إبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
const CATEGORIES = [
  {id:'food',label:'طعام',emoji:'🍽️'},{id:'bills',label:'فواتير',emoji:'🧾'},
  {id:'kids',label:'الأولاد',emoji:'👦'},{id:'staff',label:'رواتب العمال',emoji:'💸'},
  {id:'loan',label:'قرض',emoji:'🏦'},{id:'clothes',label:'ملابس',emoji:'👗'},
  {id:'health',label:'صحة',emoji:'💊'},{id:'transport',label:'مواصلات',emoji:'🚗'},
  {id:'other',label:'أخرى',emoji:'📦'},
];
const DEFAULT_ITEMS = [
  {name:"مصروف لمى",amount:4500,isWife:true,cat:''},
  {name:"مصروف صالح",amount:3500,isWife:false,cat:''},
  {name:"بانزين",amount:500,isWife:false,cat:'transport'},
  {name:"فاتورة الكهرباء",amount:430,isWife:false,cat:'bills'},
  {name:"مقاضي البيت",amount:2800,isWife:false,cat:'food'},
  {name:"أغراض خالد وعبدالرحمن",amount:1800,isWife:false,cat:'kids'},
  {name:"فواتير الجوالات",amount:1700,isWife:false,cat:'bills'},
  {name:"القرض",amount:7000,isWife:false,cat:'loan'},
  {name:"راتب اليزا",amount:1500,isWife:false,cat:'staff'},
  {name:"راتب السواق",amount:1300,isWife:false,cat:'staff'},
  {name:"راتب آن",amount:1600,isWife:false,cat:'staff'},
];

const SID = Math.random().toString(36).slice(2);
let months=[],selId=null,tab='exp';
let newWife=false,editWife=false,editingId=null,newCat='',editCat='',delMonthId=null;
let notifEnabled=localStorage.getItem('notif')==='on';
let isFirstLoad=true,unsub=null;

// ── Auth ──────────────────────────────────────────────────
onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('app').classList.add('visible');
    document.getElementById('userBadge').textContent='👤 '+user.email.split('@')[0];
    startListening();
  } else {
    document.getElementById('loginScreen').style.display='flex';
    document.getElementById('app').classList.remove('visible');
    if(unsub){unsub();unsub=null;}
  }
});

window.doLogin = async () => {
  const email=document.getElementById('loginEmail').value.trim();
  const pass=document.getElementById('loginPass').value;
  const btn=document.getElementById('loginBtn');
  const err=document.getElementById('loginError');
  if(!email||!pass) return;
  btn.disabled=true; btn.textContent='جاري الدخول...';
  err.classList.remove('show');
  try { await signInWithEmailAndPassword(auth,email,pass); }
  catch(e) { err.classList.add('show'); btn.disabled=false; btn.textContent='دخول'; }
};

window.doLogout = async () => { if(unsub)unsub(); await signOut(auth); };

document.getElementById('loginPass').addEventListener('keydown',e=>{ if(e.key==='Enter') window.doLogin(); });

// ── Firestore ─────────────────────────────────────────────
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}

async function saveMonth(){
  showSync('جاري الحفظ...');
  try{
    await setDoc(doc(db,'budget','months'),{data:months,lastModifiedBy:SID,lastModifiedAt:Date.now()});
    hideSync();
  }catch(e){showSync('خطأ ❌',true);}
}

function showSync(msg,err=false){const b=document.getElementById('syncBar');b.textContent=msg;b.className='sync-bar show'+(err?' error':'');}
function hideSync(){setTimeout(()=>{document.getElementById('syncBar').className='sync-bar';},1500);}

function startListening(){
  isFirstLoad=true;
  unsub=onSnapshot(doc(db,'budget','months'),snap=>{
    if(snap.exists()){
      const d=snap.data(); months=d.data||[];
      if(!isFirstLoad&&d.lastModifiedBy&&d.lastModifiedBy!==SID){
        const user=auth.currentUser?.email?.split('@')[0]||'الطرف الثاني';
        showNotifBanner('💰 تم التعديل',`قام ${user==='saleh'?'لمى':'صالح'} بتحديث الميزانية`);
      }
      isFirstLoad=false;
    } else {
      const now=new Date();
      months=[{id:uid(),monthIndex:now.getMonth(),year:now.getFullYear(),salary:36216,items:DEFAULT_ITEMS.map(i=>({...i,id:uid()}))}];
      saveMonth(); isFirstLoad=false;
    }
    if(!selId||!months.find(m=>m.id===selId)) selId=months[0]?.id||null;
    render();
  });
}

// ── Notifications ─────────────────────────────────────────
let nTimer=null;
window.showNotifBanner=(t,b)=>{if(!notifEnabled)return;document.getElementById('notifTitle').textContent=t;document.getElementById('notifBody').textContent=b;const el=document.getElementById('notifBanner');el.classList.add('show');clearTimeout(nTimer);nTimer=setTimeout(()=>el.classList.remove('show'),4000);};
window.hideNotifBanner=()=>{document.getElementById('notifBanner').classList.remove('show');clearTimeout(nTimer);};
window.toggleNotifications=()=>{notifEnabled=!notifEnabled;localStorage.setItem('notif',notifEnabled?'on':'off');const btn=document.getElementById('notifToggleBtn');btn.className='notif-btn'+(notifEnabled?' on':'');btn.textContent=notifEnabled?'🔔 الإشعارات مفعّلة':'🔕 الإشعارات معطّلة';};

// ── Helpers ───────────────────────────────────────────────
function fmt(n){return Math.round(n).toLocaleString('en-US')+' ر.س';}
function getSel(){return months.find(m=>m.id===selId);}
function total(m){return m.items.reduce((s,i)=>s+Number(i.amount),0);}
function wifeT(m){return m.items.filter(i=>i.isWife).reduce((s,i)=>s+Number(i.amount),0);}
function sur(m){return m.salary-total(m);}
function getCat(id){return CATEGORIES.find(c=>c.id===id);}

// ── Render ────────────────────────────────────────────────
function render(){
  renderMonthBar();
  const m=getSel(); if(!m) return;
  document.getElementById('salaryInput').value=m.salary;
  tab==='exp'?renderExp(m):renderSum(m);
  document.getElementById('tabExp').className='tab-btn'+(tab==='exp'?' active':'');
  document.getElementById('tabSum').className='tab-btn'+(tab==='sum'?' active':'');
}

function renderMonthBar(){
  document.getElementById('monthBar').innerHTML=months.map(m=>`
    <button class="month-btn${m.id===selId?' active':''}" onclick="selMonth('${m.id}')">
      ${MONTHS[m.monthIndex]}
      <span class="month-del" onclick="event.stopPropagation();openDelMonth('${m.id}')">✕</span>
    </button>`).join('');
}

function renderExp(m){
  const t=total(m),w=wifeT(m),s=sur(m),pct=Math.min(t/m.salary*100,100);
  const bc=pct>90?'var(--red)':pct>70?'var(--gold)':'var(--teal)';
  const rows=m.items.map(item=>{
    const cat=getCat(item.cat);
    return `<div class="exp-row${item.isWife?' wife':''}">
      <div class="dot${item.isWife?' w':' r'}"></div>
      <div class="exp-info">
        <div class="exp-name${item.isWife?' wife':''}">${item.name}</div>
        ${cat?`<div class="exp-cat">${cat.emoji} ${cat.label}</div>`:''}
      </div>
      <div class="exp-amt${item.isWife?' wife':''}">${fmt(item.amount)}</div>
      <button class="row-btn heart${item.isWife?' on':''}" onclick="toggleWife('${item.id}')">${item.isWife?'💚':'🤍'}</button>
      <button class="row-btn" onclick="openEdit('${item.id}')">✏️</button>
      <button class="row-btn del" onclick="delItem('${item.id}')">🗑</button>
    </div>`;
  }).join('');
  document.getElementById('scrollArea').innerHTML=`
    <div class="stats-row">
      <div class="stat-card green"><div class="lbl">💚 تحويل لمى</div><div class="val">${fmt(w)}</div></div>
      <div class="stat-card ${s>=0?'gold':'red2'}"><div class="lbl">${s>=0?'✨ الفائض':'⚠️ العجز'}</div><div class="val">${fmt(Math.abs(s))}</div></div>
    </div>
    <div class="card prog-card">
      <div class="prog-meta"><span style="color:${bc};font-weight:700">${Math.round(pct)}٪ من الراتب</span><span style="color:var(--muted)">الراتب: ${fmt(m.salary)}</span></div>
      <div class="prog-bg"><div class="prog-fill" style="width:${pct}%;background:${bc}"></div></div>
      <div class="prog-sub"><span>المصروف: ${fmt(t)}</span></div>
    </div>
    <div class="card">
      <div class="sec-hdr"><div class="sec-title">${m.items.length} بند</div><span style="font-size:11px;color:var(--green-med)">🟢 لمى: ${fmt(w)}</span></div>
      ${rows}
      <button class="add-trigger" onclick="openAdd()">＋ إضافة بند جديد</button>
    </div>`;
}

function renderSum(m){
  const t=total(m),w=wifeT(m),s=sur(m);
  const catTotals={};
  m.items.forEach(i=>{const k=i.cat||'other';catTotals[k]=(catTotals[k]||0)+Number(i.amount);});
  const catRows=Object.entries(catTotals).sort((a,b)=>b[1]-a[1]).map(([id,amt])=>{
    const cat=getCat(id)||getCat('other');
    return `<div class="cat-sum-row"><div class="cat-sum-label">${cat.emoji} ${cat.label}</div><div class="cat-sum-val">${fmt(amt)}</div></div>`;
  }).join('');
  const bars=[...m.items].sort((a,b)=>b.amount-a.amount).map(item=>{
    const p=t>0?item.amount/t*100:0;
    return `<div class="chart-item">
      <div class="chart-meta"><span class="chart-pct">${Math.round(p)}٪</span><span class="chart-name${item.isWife?' wife':''}">${item.name}</span></div>
      <div class="chart-bg"><div class="chart-bar${item.isWife?' wife':' reg'}" style="width:${p}%"></div></div>
    </div>`;
  }).join('');
  document.getElementById('scrollArea').innerHTML=`
    <div class="card">
      <div class="sum-row"><div class="sum-val teal">${fmt(m.salary)}</div><div class="sum-lbl">💼 الراتب الشهري</div></div>
      <div class="sum-row"><div class="sum-val">${fmt(t)}</div><div class="sum-lbl">📋 إجمالي المصاريف</div></div>
      <div class="sum-row"><div class="sum-val ${s>=0?'gold':'red'}">${fmt(Math.abs(s))}</div><div class="sum-lbl">${s>=0?'✨ الفائض':'⚠️ العجز'}</div></div>
      <div class="sum-row hi"><div class="sum-val green big">${fmt(w)}</div><div class="sum-lbl green">💚 تحويل حساب لمى</div></div>
    </div>
    <div class="card"><div class="sec-hdr"><div class="sec-title">حسب التصنيف</div></div>${catRows}</div>
    <div class="card"><div class="chart-sec"><div class="chart-title">توزيع المصاريف</div>${bars}</div></div>`;
}

function renderCatPills(cid,active){
  document.getElementById(cid).innerHTML=[
    `<button class="cat-pill${active===''?' active':''}" onclick="setCat('${cid}','')">بدون</button>`,
    ...CATEGORIES.map(c=>`<button class="cat-pill${active===c.id?' active':''}" onclick="setCat('${cid}','${c.id}')">${c.emoji} ${c.label}</button>`)
  ].join('');
}

// ── Actions ───────────────────────────────────────────────
window.setCat=(cid,v)=>{if(cid==='newCatPills')newCat=v;else editCat=v;renderCatPills(cid,v);};
window.selMonth=id=>{selId=id;render();};
window.setTab=t=>{tab=t;render();};
window.toggleWife=id=>{const m=getSel();if(!m)return;const i=m.items.find(x=>x.id===id);if(!i)return;i.isWife=!i.isWife;saveMonth();render();};
window.delItem=id=>{if(!confirm('حذف هذا البند؟'))return;const m=getSel();if(!m)return;m.items=m.items.filter(i=>i.id!==id);saveMonth();render();};
window.openAdd=()=>{newWife=false;newCat='';document.getElementById('newName').value='';document.getElementById('newAmt').value='';document.getElementById('newSw').className='sw';renderCatPills('newCatPills','');openSheet('addSheet');setTimeout(()=>document.getElementById('newName').focus(),350);};
window.confirmAdd=()=>{const name=document.getElementById('newName').value.trim();const amt=parseFloat(document.getElementById('newAmt').value);if(!name||!amt||amt<=0)return;const m=getSel();if(!m)return;m.items.push({id:uid(),name,amount:amt,isWife:newWife,cat:newCat});saveMonth();render();closeSheet('addSheet');};
window.openEdit=id=>{const m=getSel();if(!m)return;const item=m.items.find(i=>i.id===id);if(!item)return;editingId=id;editWife=item.isWife;editCat=item.cat||'';document.getElementById('editName').value=item.name;document.getElementById('editAmt').value=item.amount;document.getElementById('editSw').className='sw'+(editWife?' on':'');renderCatPills('editCatPills',editCat);openSheet('editSheet');};
window.confirmEdit=()=>{const name=document.getElementById('editName').value.trim();const amt=parseFloat(document.getElementById('editAmt').value);if(!name||!amt||amt<=0)return;const m=getSel();if(!m)return;const item=m.items.find(i=>i.id===editingId);if(!item)return;item.name=name;item.amount=amt;item.isWife=editWife;item.cat=editCat;saveMonth();render();closeSheet('editSheet');};
window.confirmAddMonth=()=>{const idx=parseInt(document.getElementById('newMonthIdx').value);const year=parseInt(document.getElementById('newMonthYear').value)||2025;const last=months.length?months[months.length-1].salary:36216;const m={id:uid(),monthIndex:idx,year,salary:last,items:DEFAULT_ITEMS.map(i=>({...i,id:uid()}))};months.push(m);selId=m.id;saveMonth();render();closeSheet('monthSheet');};
window.openDelMonth=id=>{if(months.length<=1){alert('لا يمكن حذف الشهر الوحيد');return;}delMonthId=id;const m=months.find(x=>x.id===id);document.getElementById('delMonthMsg').textContent=`هل تريد حذف شهر ${MONTHS[m.monthIndex]}؟`;openSheet('delMonthSheet');};
window.confirmDelMonth=()=>{months=months.filter(m=>m.id!==delMonthId);if(selId===delMonthId)selId=months[0]?.id||null;saveMonth();render();closeSheet('delMonthSheet');};
window.toggleSw=(swId,v)=>{if(v==='newWife')newWife=!newWife;else editWife=!editWife;const val=v==='newWife'?newWife:editWife;document.getElementById(swId).className='sw'+(val?' on':'');};
window.openSheet=id=>document.getElementById(id).classList.add('open');
window.closeSheet=id=>document.getElementById(id).classList.remove('open');
document.querySelectorAll('.overlay').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');}));
document.getElementById('addMonthBtn').onclick=()=>openSheet('monthSheet');
document.getElementById('notifBtn').onclick=()=>{const btn=document.getElementById('notifToggleBtn');btn.className='notif-btn'+(notifEnabled?' on':'');btn.textContent=notifEnabled?'🔔 الإشعارات مفعّلة':'🔕 تفعيل الإشعارات';openSheet('notifSheet');};
document.getElementById('salaryInput').addEventListener('change',e=>{const m=getSel();if(!m)return;m.salary=parseFloat(e.target.value)||36216;saveMonth();render();});
</script>
</body>
</html>
